name: PedalWorkshop
options:
  bundleIdPrefix: com.pedalworkshop
  deploymentTarget:
    macOS: "26.0"
    iOS: "26.0"
    tvOS: "26.0"
    watchOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  WorkshopCore:
    path: .

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:

  # ── macOS ──────────────────────────────────────────────────────────────────
  PedalWorkshop-macOS:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: App/Shared/Views
      - path: App/macOS
    dependencies:
      - package: WorkshopCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pedalworkshop.mac
        PRODUCT_NAME: "Pedal Workshop"
        INFOPLIST_FILE: App/macOS/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: App/macOS/Info.plist
      properties:
        CFBundleName: Pedal Workshop
        CFBundleDisplayName: Pedal Workshop
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true

  # ── iOS ────────────────────────────────────────────────────────────────────
  PedalWorkshop-iOS:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App/Shared/Views
      - path: App/iOS
    dependencies:
      - package: WorkshopCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pedalworkshop.ios
        PRODUCT_NAME: "Pedal Workshop"
        INFOPLIST_FILE: App/iOS/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: App/iOS/Info.plist
      properties:
        CFBundleName: Pedal Workshop
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true

  # ── tvOS ───────────────────────────────────────────────────────────────────
  PedalWorkshop-tvOS:
    type: application
    platform: tvOS
    deploymentTarget: "26.0"
    sources:
      - path: App/Shared/Views
      - path: App/tvOS
    dependencies:
      - package: WorkshopCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pedalworkshop.tvos
        PRODUCT_NAME: "Pedal Workshop"
        INFOPLIST_FILE: App/tvOS/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: App/tvOS/Info.plist
      properties:
        CFBundleName: Pedal Workshop
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true

  # ── watchOS ────────────────────────────────────────────────────────────────
  PedalWorkshop-watchOS:
    type: application
    platform: watchOS
    deploymentTarget: "26.0"
    sources:
      - path: App/watchOS/Extension
    dependencies:
      - package: WorkshopCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pedalworkshop.watchos
        PRODUCT_NAME: "Pedal Workshop"
        INFOPLIST_FILE: App/watchOS/Extension/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: App/watchOS/Extension/Info.plist
      properties:
        CFBundleName: Pedal Workshop
        WKApplication: true
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true
