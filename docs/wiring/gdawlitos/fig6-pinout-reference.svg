<rect x="0" y="0" width="1240" height="1030" fill="#ffffff"/>
<text x="620" y="36" text-anchor="middle" class="t" font-size="22" font-weight="bold">fig 6 &#8212; pinout reference: Pi 40-pin header &#183; TL072 &#183; 7809</text>
<text x="620" y="60" text-anchor="middle" class="tm" font-size="14">this rig powers the Pi by USB-C and records by USB &#8212; the header is OPTIONAL (display / footswitch only) &#183; all GPIO are 3.3&#8201;V logic</text>
<text x="330" y="100" text-anchor="middle" class="t" font-size="15" font-weight="bold">RASPBERRY PI 40-PIN HEADER</text>
