<text x="910" y="112" text-anchor="middle" class="t" font-size="15" font-weight="bold">TL072 (buffer) &#8212; DIP-8, top view</text>
<rect x="850" y="130" width="120" height="180" rx="8" class="box"/>
<path d="M 895 130 A 15 15 0 0 0 925 130" fill="#ffffff" stroke="#57534e" stroke-width="2"/>
<rect x="834" y="156" width="18" height="18" fill="#e7e5e4" stroke="#44403c" stroke-width="1.5"/>
<text x="843" y="169" text-anchor="middle" class="pn" fill="#1c1917" font-size="10">1</text>
<text x="826" y="169" text-anchor="end" class="tm" font-size="10">OUT A &#8594; tap out (wire 24)</text>
<rect x="834" y="194" width="18" height="18" fill="#e7e5e4" stroke="#44403c" stroke-width="1.5"/>
<text x="843" y="207" text-anchor="middle" class="pn" fill="#1c1917" font-size="10">2</text>
<text x="826" y="207" text-anchor="end" class="tm" font-size="10">IN A&#8722; &#8594; tie to pin 1 (unity)</text>
<rect x="834" y="232" width="18" height="18" fill="#e7e5e4" stroke="#44403c" stroke-width="1.5"/>
<text x="843" y="245" text-anchor="middle" class="pn" fill="#1c1917" font-size="10">3</text>
<text x="826" y="245" text-anchor="end" class="tm" font-size="10">IN A+ &#8594; signal in via cap + bias</text>
<rect x="834" y="270" width="18" height="18" fill="#e7e5e4" stroke="#44403c" stroke-width="1.5"/>
<text x="843" y="283" text-anchor="middle" class="pn" fill="#1c1917" font-size="10">4</text>
<text x="826" y="283" text-anchor="end" class="tm" font-size="10">V&#8722; &#8594; ground</text>
<rect x="968" y="156" width="18" height="18" fill="#e7e5e4" stroke="#44403c" stroke-width="1.5"/>
<text x="977" y="169" text-anchor="middle" class="pn" fill="#1c1917" font-size="10">8</text>
<text x="994" y="169" class="tm" font-size="10">V+ &#8594; +9&#8201;V rail</text>
<rect x="968" y="194" width="18" height="18" fill="#e7e5e4" stroke="#44403c" stroke-width="1.5"/>
<text x="977" y="207" text-anchor="middle" class="pn" fill="#1c1917" font-size="10">7</text>
<text x="994" y="207" class="tm" font-size="10">OUT B &#8594; tie to pin 6</text>
<rect x="968" y="232" width="18" height="18" fill="#e7e5e4" stroke="#44403c" stroke-width="1.5"/>
<text x="977" y="245" text-anchor="middle" class="pn" fill="#1c1917" font-size="10">6</text>
<text x="994" y="245" class="tm" font-size="10">IN B&#8722; &#8594; tie to pin 7</text>
<rect x="968" y="270" width="18" height="18" fill="#e7e5e4" stroke="#44403c" stroke-width="1.5"/>
<text x="977" y="283" text-anchor="middle" class="pn" fill="#1c1917" font-size="10">5</text>
<text x="994" y="283" class="tm" font-size="10">IN B+ &#8594; &#189;-supply bias</text>
<text x="910" y="335" text-anchor="middle" class="tm" font-size="10">&#189;-supply bias = two equal resistors (1&#8201;M) from 9&#8201;V to ground,</text>
<text x="910" y="349" text-anchor="middle" class="tm" font-size="10">midpoint to pin 3 through the input cap network</text>
<text x="910" y="412" text-anchor="middle" class="t" font-size="15" font-weight="bold">7809 &#8212; TO-220, facing the label</text>
<rect x="855" y="430" width="110" height="30" rx="4" fill="#d6d3d1" stroke="#44403c" stroke-width="2"/>
<circle cx="910" cy="445" r="6" fill="#ffffff" stroke="#44403c" stroke-width="1.5"/>
<rect x="855" y="460" width="110" height="60" rx="4" class="box"/>
<line x1="875" y1="520" x2="875" y2="550" stroke="#44403c" stroke-width="4"/>
<text x="875" y="566" text-anchor="middle" class="pn" fill="#1c1917" font-size="10">1</text>
<line x1="910" y1="520" x2="910" y2="550" stroke="#44403c" stroke-width="4"/>
<text x="910" y="566" text-anchor="middle" class="pn" fill="#1c1917" font-size="10">2</text>
<line x1="945" y1="520" x2="945" y2="550" stroke="#44403c" stroke-width="4"/>
<text x="945" y="566" text-anchor="middle" class="pn" fill="#1c1917" font-size="10">3</text>
<text x="910" y="590" text-anchor="middle" class="tm" font-size="10">1 = IN (18&#8201;V) &#183; 2 = GND &#183; 3 = OUT (9&#8201;V) &#183; metal tab = GND</text>
<text x="910" y="604" text-anchor="middle" class="tm" font-size="10">heatsink touches the tab only &#8212; tab is ground, keep it off +18&#8201;V wiring</text>
<rect x="700" y="650" width="470" height="200" rx="8" fill="#fffbeb" stroke="#b45309" stroke-width="2"/>
<text x="935" y="678" text-anchor="middle" class="t" font-size="14" font-weight="bold">WHAT THIS RIG ACTUALLY CONNECTS</text>
<text x="716" y="704" class="tm" font-size="11">&#8226; Power: USB-C from the 5&#8201;V buck (fig 5) &#8212; header 5&#8201;V pins stay empty</text>
<text x="716" y="726" class="tm" font-size="11">&#8226; Audio in: USB-A &#8594; USB audio interface (fig 5) &#8212; no header pins</text>
<text x="716" y="748" class="tm" font-size="11">&#8226; Optional chord display: I&#178;C OLED &#8594; pins 1 (3V3), 3 (SDA), 5 (SCL), 6 (GND)</text>
<text x="716" y="770" class="tm" font-size="11">&#8226; Optional footswitch sense: GPIO17 (pin 11) &#8594; switch &#8594; GND (pin 9),</text>
<text x="716" y="792" class="tm" font-size="11">   enable the internal pull-up in software; no external voltage</text>
<text x="716" y="814" class="tm" font-size="11">&#8226; Everything else: unconnected. Never 5/9/18&#8201;V into any GPIO or 3V3 pin.</text>
<rect x="700" y="880" width="470" height="80" rx="8" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
<text x="716" y="906" font-size="12" font-weight="bold" fill="#b91c1c" paint-order="stroke" stroke="#ffffff" stroke-width="4">HARD LIMITS</text>
<text x="716" y="926" class="tm" font-size="10">3V3 pins are outputs (peripherals only) &#183; 5&#8201;V pins are outputs when USB-C powered &#8212; do not back-feed &#183;</text>
<text x="716" y="942" class="tm" font-size="10">GPIO tolerate 3.3&#8201;V max &#183; guitar signal never goes to GPIO &#8212; it goes through the USB interface (fig 5)</text>
</svg>